<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スロットゲーム</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle, #111, #000);
    color: white;
    text-align: center;
  }

  h1 { margin-top: 20px; }

  .money { font-size: 20px; margin-top: 10px; }

  .slot-container {
    display: flex;
    justify-content: center;
    margin: 30px 0;
    gap: 20px;
  }

  .reel {
    width: 100px;
    height: 120px;
    background: #222;
    border: 4px solid gold;
    border-radius: 10px;
    font-size: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 15px gold;
  }

  button {
    padding: 10px 20px;
    margin: 5px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: gold;
    cursor: pointer;
  }

  .result { margin-top: 20px; font-size: 22px; height: 30px; }
</style>
</head>
<body>

<h1>🎰 一攫千金！スロットゲーム 💸</h1>
<div class="money" id="money">所持金: 1000</div>
<div class="money" id="mode">通常モード</div>

<div class="slot-container">
  <div class="reel" id="reel1">🍒</div>
  <div class="reel" id="reel2">🍋</div>
  <div class="reel" id="reel3">🍊</div>
</div>

<div>
  <button onclick="startGame()">スタート（100円）</button><br>
  <button onclick="stopReel(0)">ストップ①</button>
  <button onclick="stopReel(1)">ストップ②</button>
  <button onclick="stopReel(2)">ストップ③</button>
</div>

<div class="result" id="result"></div>

<script>
const normalSymbols = ["🍒","🍋","🍊","⭐","🔔","7️⃣"];
const kakuSymbols = ["7️⃣","7️⃣","7️⃣","⭐","7️⃣","🔔"]; // 確変は7多め

let reels = [null, null, null];
let intervals = [];
let spinning = [false, false, false];
let money = 1000;
let kakuhen = false;

function getSymbols() {
  return kakuhen ? kakuSymbols : normalSymbols;
}

function randomSymbol() {
  const s = getSymbols();
  return s[Math.floor(Math.random() * s.length)];
}

function startGame() {
  if (spinning.includes(true)) return;
  if (money < 100) {
    alert("お金が足りません！");
    return;
  }

  money -= 100;
  updateMoney();

  for (let i = 0; i < 3; i++) {
    const reelEl = document.getElementById("reel" + (i+1));
    spinning[i] = true;

    intervals[i] = setInterval(() => {
      reelEl.textContent = randomSymbol();
    }, 100);
  }

  document.getElementById("result").textContent = "回転中...";
}

function stopReel(index) {
  if (!spinning[index]) return;

  clearInterval(intervals[index]);
  const reelEl = document.getElementById("reel" + (index+1));
  const symbol = randomSymbol();
  reelEl.textContent = symbol;
  reels[index] = symbol;
  spinning[index] = false;

  if (spinning.every(v => !v)) {
    checkResult();
  }
}

function checkResult() {
  const resultEl = document.getElementById("result");

  if (reels[0] === reels[1] && reels[1] === reels[2]) {
    if (reels[0] === "7️⃣") {
      money += 1000;
      kakuhen = true;
      resultEl.textContent = "🎉 777！確変突入！+1000円";
    } else {
      money += 300;
      resultEl.textContent = "✨ 大当たり！+300円";
    }
  } else if (reels[0] === reels[1] || reels[1] === reels[2] || reels[0] === reels[2]) {
    money += 100;
    resultEl.textContent = "👍 2つ揃い！+100円";
  } else {
    kakuhen = false;
    resultEl.textContent = "ハズレ（通常に戻る）";
  }

  updateMoney();
  updateMode();
}

function updateMoney() {
  document.getElementById("money").textContent = "所持金: " + money;
}

function updateMode() {
  document.getElementById("mode").textContent = kakuhen ? "🔥 確変モード" : "通常モード";
}
</script>

</body>
</html>
