<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スロットゲーム</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle, #111, #000);
    color: white;
    text-align: center;
  }

  h1 {
    margin-top: 20px;
  }

  .slot-container {
    display: flex;
    justify-content: center;
    margin: 40px 0;
    gap: 20px;
  }

  .reel {
    width: 100px;
    height: 120px;
    background: #222;
    border: 4px solid gold;
    border-radius: 10px;
    font-size: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 15px gold;
  }

  button {
    padding: 15px 40px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    background: gold;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    transform: scale(1.1);
  }

  .result {
    margin-top: 30px;
    font-size: 24px;
    height: 30px;
  }
</style>
</head>
<body>

<h1>🎰 スロットゲーム</h1>

<div class="slot-container">
  <div class="reel" id="reel1">🍒</div>
  <div class="reel" id="reel2">🍋</div>
  <div class="reel" id="reel3">🍊</div>
</div>

<button onclick="startSlot()">回す！</button>

<div class="result" id="result"></div>

<script>
const symbols = ["🍒", "🍋", "🍊", "⭐", "🔔", "7️⃣"];
let spinning = false;

function randomSymbol() {
  return symbols[Math.floor(Math.random() * symbols.length)];
}

function spinReel(element, duration) {
  return new Promise(resolve => {
    const interval = setInterval(() => {
      element.textContent = randomSymbol();
    }, 100);

    setTimeout(() => {
      clearInterval(interval);
      const finalSymbol = randomSymbol();
      element.textContent = finalSymbol;
      resolve(finalSymbol);
    }, duration);
  });
}

async function startSlot() {
  if (spinning) return;
  spinning = true;

  const resultEl = document.getElementById("result");
  resultEl.textContent = "回転中...";

  const reel1 = document.getElementById("reel1");
  const reel2 = document.getElementById("reel2");
  const reel3 = document.getElementById("reel3");

  const r1 = spinReel(reel1, 1000);
  const r2 = spinReel(reel2, 1500);
  const r3 = spinReel(reel3, 2000);

  const results = await Promise.all([r1, r2, r3]);

  if (results[0] === results[1] && results[1] === results[2]) {
    resultEl.textContent = "🎉 大当たり！ 🎉";
  } else if (results[0] === results[1] || results[1] === results[2] || results[0] === results[2]) {
    resultEl.textContent = "✨ 惜しい！2つ揃い！";
  } else {
    resultEl.textContent = "ハズレ...";
  }

  spinning = false;
}
</script>

</body>
</html>
